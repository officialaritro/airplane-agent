app = "reroute"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  min_failures = 3
  pause_threshold = "10s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
  count = 1

[[ mounts]]
  source = "reroute_data"
  destination = "/data"

[processes]
  api = "uvicorn main:app --host 0.0.0.0 --port 8000"
  worker = "python worker.py"
